services:
  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: [observability]
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ECOMMERCE_API_HOST_IP: ${ECOMMERCE_API_HOST_IP:-host.docker.internal}
    volumes:
      - ./infra/observability/prometheus/prometheus.template.yml:/etc/prometheus/prometheus.template.yml:ro
      - prometheus_data:/prometheus
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sed "s/__API_HOST__/$${ECOMMERCE_API_HOST_IP}/g" /etc/prometheus/prometheus.template.yml > /tmp/prometheus.yml
        exec /bin/prometheus --config.file=/tmp/prometheus.yml --storage.tsdb.path=/prometheus
    depends_on:
      - kafka-exporter

  grafana:
    image: grafana/grafana:11.4.0
    profiles: [observability]
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/observability/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./infra/observability/grafana/provisioning/dashboards/json:/etc/grafana/provisioning/dashboards/json:ro
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.3.2
    profiles: [observability]
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.3.2
    profiles: [observability]
    volumes:
      - ./infra/observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_data:/tmp
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.8.0
    profiles: [observability]
    ports:
      - "9308:9308"
    command:
      - --kafka.server=kafka:29092
      - --web.listen-address=:9308
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  promtail_data:
