services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: rabbit
      RABBITMQ_DEFAULT_PASS: rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    command: >
      sh -c "rabbitmq-plugins enable rabbitmq_prometheus &&
      rabbitmq-server"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  ecommerce-ia:
    build: ./ecommerce-ia
    env_file:
      - ./ecommerce-ia/.env
    ports:
      - "8100:8100"
    environment:
      APP_ENV: development
      APP_PORT: 8100
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ecommerce
      ECOMMERCE_API_URL: http://${ECOMMERCE_API_HOST_IP:-host.docker.internal}:3000
      ECOMMERCE_API_FALLBACK_URLS: http://172.17.0.1:3000,http://host.docker.internal:3000
      ECOMMERCE_API_HOST_IP: ${ECOMMERCE_API_HOST_IP:-}
      OPENAI_MODEL: gpt-4o-mini
      EMBEDDING_MODEL: text-embedding-3-small
      KAFKA_BROKERS: kafka:29092
      RABBITMQ_URL: amqp://rabbit:rabbit@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecret
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      CHROMA_PERSIST_DIR: .chroma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./ecommerce-ia/src:/app/src
      - ecommerce_ia_chroma:/app/.chroma
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "ecommerce_ia.main:socket_app",
        "--host",
        "0.0.0.0",
        "--port",
        "8100",
        "--reload",
      ]

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: shopmax-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  ecommerce_ia_chroma:
