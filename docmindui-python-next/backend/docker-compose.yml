services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docmind-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docmind"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: docmind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: docmind-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: docmind-api
    command: sh -c "PYTHONPATH=. uv run alembic upgrade head && uv run uvicorn src.main:asgi_app --host 0.0.0.0 --port 8001"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/docmind
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_INDEX_DOCUMENTS: "true"
      DOCUMENTS_STORAGE_DIR: /data/document_uploads
      SOCKETIO_CORS_ORIGINS: "*"
    ports:
      - "8001:8001"
    volumes:
      - document_uploads_data:/data/document_uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  celery-worker:
    build: .
    container_name: docmind-celery-worker
    command:
      [
        "uv",
        "run",
        "celery",
        "-A",
        "src.workers.celery_app",
        "worker",
        "-Q",
        "default,documents,emails",
        "--loglevel=info",
      ]
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/docmind
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_INDEX_DOCUMENTS: "true"
      DOCUMENTS_STORAGE_DIR: /data/document_uploads
    volumes:
      - document_uploads_data:/data/document_uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  document_uploads_data:
